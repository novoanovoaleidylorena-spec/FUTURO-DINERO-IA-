<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FUTURO DEL DINERO CON LA IA</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <script defer src="script.js"></script>
</head>

<body>

<div class="app">

  <h1>FUTURO DEL DINERO CON LA IA</h1>

  <!-- Robot IA -->
  <div class="robot">
    <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_kyu7xb1v.json" loop autoplay></lottie-player>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">

    <div class="card">
      <h2>Ingresos (COP)</h2>
      <input type="number" id="income">
    </div>

    <div class="card">
      <h2>Gastos (COP)</h2>
      <input type="number" id="expenses">
    </div>

    <div class="card">
      <h2>Meta (COP)</h2>
      <input type="number" id="goal">
    </div>

    <div class="card">
      <h2>Inflación (%)</h2>
      <input type="number" id="inflation" value="9">
    </div>

    <div class="card">
      <h2>Inversión</h2>
      <select id="investment">
        <option value="0.05">Bajo riesgo</option>
        <option value="0.12">Medio</option>
        <option value="0.20">Alto (crypto)</option>
      </select>
    </div>

    <div class="card">
      <h2>Meta personal</h2>
      <select id="dream">
        <option value="viaje">Viaje</option>
        <option value="casa">Casa</option>
        <option value="carro">Carro</option>
        <option value="moto">Moto</option>
        <option value="estudio">Estudio</option>
        <option value="negocio">Negocio</option>
        <option value="tecnologia">Tecnología</option>
        <option value="ahorro">Ahorro</option>
        <option value="inversion">Inversión</option>
        <option value="ropa">Ropa</option>
        <option value="salud">Salud</option>
        <option value="familia">Familia</option>
        <option value="fiesta">Fiesta</option>
        <option value="deuda">Deuda</option>
        <option value="otro">Otro</option>
      </select>
    </div>

  </div>

  <button onclick="calculate()">Calcular</button>
  <button onclick="downloadPDF()">Descargar PDF</button>

  <div class="results">
    <h2 id="months"></h2>
    <h3 id="aiAdvice"></h3>

    <div class="money-bar">
      <div id="progress"></div>
    </div>

    <canvas id="chart"></canvas>

    <div class="counter" id="counter">$0</div>

    <img id="dreamImage">
  </div>

</div>

</body>
</html>
